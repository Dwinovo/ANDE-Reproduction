run_name: ande_8100_2cls
seed: 42
data:
  size: 8100
  task: binary2
  split_ratio: 0.8
  batch_size: 64
  num_workers: 4
  manifest_raw: data/manifest_raw.parquet
  manifest_stats: data/manifest_stats.parquet
model:
  name: ande
  use_se: true
  se_reduction: 16
train:
  epochs: 30
  optimizer: adam
  lr: 0.001
  scheduler: step
  step_size: 10
  gamma: 0.5
  early_stop_patience: 5
